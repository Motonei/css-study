<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Course</title>


<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>


{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* HERO SECTION */

.hero{
height:90vh;

background:
linear-gradient(rgba(128,0,255,0.6), rgba(128,0,255,0.6)),
url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f");

background-size:cover;
background-position:center;

color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 80px;
}

.logo{
font-size:24px;
font-weight:bold;
}

.nav-links{
display:flex;
gap:35px;
list-style:none;
}

.nav-links a{
text-decoration:none;
color:white;
font-size:16px;
}

.nav-links a:hover{
color:#ff5a7d;
}

.nav-icons{
display:flex;
gap:15px;
align-items:center;
}

.nav-icons a{
color:white;
text-decoration:none;
}

/* HERO CONTENT */

.hero-content{
text-align:center;
margin-top:150px;
padding:0 20px;
}

.hero-content h1{
font-size:60px;
margin-bottom:20px;
}

.hero-content p{
font-size:18px;
margin-bottom:25px;
}

.hero-content button{

padding:14px 35px;
border:none;

background:#ff5a7d;

color:white;

font-size:16px;

border-radius:25px;

cursor:pointer;

transition:0.3s;
}

.hero-content button:hover{
background:#ff2f63;
}

/* MOBILE */

@media (max-width:900px){

.navbar{
padding:20px 30px;
}

.hero-content h1{
font-size:35px;
}

.nav-links{
display:none;
}

}

</style>
</head>

<body>

<header class="hero">

<nav class="navbar">

<div class="logo">
<i class="fa-solid fa-gem"></i> Study Course
</div>

<ul class="nav-links">
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Courses</a></li>
<li><a href="#">Pages</a></li>
<li><a href="#">Contact</a></li>
</ul>

<div class="nav-icons">
<i class="fa-solid fa-magnifying-glass"></i>
<i class="fa-solid fa-user"></i>
<a href="#">Login</a>
<i class="fa-solid fa-moon"></i>
</div>

</nav>

<div class="hero-content">

<h1>50% Discount on all Popular Courses</h1>

<p>
Take the first step to your journey to success with us
</p>

<button>Ready to get started?</button>

</div>

</header>

</body>
</html>
